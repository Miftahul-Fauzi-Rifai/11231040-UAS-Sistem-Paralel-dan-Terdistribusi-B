services:

  # ─── Storage: PostgreSQL ────────────────────────────────────────────────────
  storage:
    image: postgres:16-alpine
    container_name: storage
    environment:
      POSTGRES_DB:       logdb
      POSTGRES_USER:     user
      POSTGRES_PASSWORD: pass
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d logdb"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  # ─── Broker: Redis ──────────────────────────────────────────────────────────
  broker:
    image: redis:7-alpine
    container_name: broker
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - broker_data:/data
    networks:
      - internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # ─── Aggregator: FastAPI app ────────────────────────────────────────────────
  aggregator:
    build: ./aggregator
    image: uts-aggregator:latest
    container_name: aggregator
    depends_on:
      storage:
        condition: service_healthy
      broker:
        condition: service_healthy
    environment:
      DATABASE_URL:     postgresql://user:pass@storage:5432/logdb
      BROKER_URL:       redis://broker:6379
      CONSUMER_WORKERS: "4"
    ports:
      - "8080:8080"
    networks:
      - internal
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"
        ]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s
    restart: unless-stopped

  # ─── Publisher: event simulator ─────────────────────────────────────────────
  publisher:
    profiles:
      - loadtest

    build: ./publisher
    image: uts-publisher:latest
    container_name: publisher
    depends_on:
      aggregator:
        condition: service_healthy
    environment:
      TARGET_URL: http://aggregator:8080/publish
      TOTAL_EVENTS: "1000"
      EVENTS_PER_BATCH: "20"
      DUPLICATE_RATE: "0.35"
      DELAY_MS: "50"
    networks:
      - internal
    restart: "no"

  # ─── K6 load test (jalankan manual: docker compose --profile load run k6) ───
  k6:
    image: grafana/k6:latest
    container_name: k6
    profiles: ["load"]
    depends_on:
      aggregator:
        condition: service_healthy
    command: run /scripts/load_test.js
    environment:
      BASE_URL: http://aggregator:8080
    volumes:
      - ./k6:/scripts
    networks:
      - internal

networks:
  internal:
    driver: bridge

volumes:
  pg_data:
  broker_data:
